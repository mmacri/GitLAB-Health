stages:
  - test
  - deploy

test:
  stage: test
  image: alpine:3.20
  script:
    - apk add --no-cache nodejs npm
    - node --test --test-isolation=none src/tests/*.test.mjs

pages:
  stage: deploy
  image: alpine:3.20
  needs:
    - test
  script:
    - apk add --no-cache nodejs
    - mkdir -p public
    - cp -R assets data print src public/
    - cp index.html 404.html cheatsheet.html .nojekyll README.md public/
    - mkdir -p public/today public/portfolio public/toolkit public/programs public/resources public/playbooks public/exports public/intake public/journey public/account
    - cp index.html public/today/index.html
    - cp index.html public/portfolio/index.html
    - cp index.html public/toolkit/index.html
    - cp index.html public/programs/index.html
    - cp index.html public/resources/index.html
    - cp index.html public/playbooks/index.html
    - cp index.html public/exports/index.html
    - cp index.html public/intake/index.html
    - cp index.html public/journey/index.html
    - cp index.html public/account/index.html
    - node -e "const fs=require('fs');const path=require('path');const raw=JSON.parse(fs.readFileSync('data/accounts.json','utf8'));const accounts=Array.isArray(raw.accounts)?raw.accounts:[];for(const a of accounts){const id=String(a.id||'').trim();if(!id)continue;const accountDir=path.join('public','account',id);const journeyDir=path.join('public','journey',id);fs.mkdirSync(accountDir,{recursive:true});fs.mkdirSync(journeyDir,{recursive:true});fs.copyFileSync('index.html',path.join(accountDir,'index.html'));fs.copyFileSync('index.html',path.join(journeyDir,'index.html'));}"
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
