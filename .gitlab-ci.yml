stages:
  - test
  - deploy

test:
  stage: test
  image: alpine:3.20
  script:
    - apk add --no-cache nodejs npm
    - node --test src/tests/*.test.mjs

pages:
  stage: deploy
  image: alpine:3.20
  needs:
    - test
  script:
    - mkdir -p public
    - cp -R assets data print src public/
    - cp index.html 404.html cheatsheet.html .nojekyll README.md public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
