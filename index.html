<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Pooled GitLab Customer Success Engineer On-Demand dashboard for triage, intake, adoption, and value outcomes."
    />
    <title>GitLab CSE On-Demand Dashboard</title>
    <link rel="stylesheet" href="./src/styles/app.css" />
    <link rel="stylesheet" href="./src/styles/tokens.css" />
    <link rel="stylesheet" href="./src/styles/base.css" />
    <link rel="stylesheet" href="./src/styles/components.css" />
    <link rel="stylesheet" href="./src/styles/utilities.css" />
    <style>
      #app-loading {
        display: flex;
        height: 100vh;
        width: 100vw;
        background: #f9fafb;
        position: fixed;
        inset: 0;
        z-index: 9999;
        transition: opacity 300ms ease;
      }
      #app-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .skeleton-sidebar {
        width: 240px;
        background: #1f1f1f;
        padding: 16px 12px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .skeleton-main {
        flex: 1;
        padding: 16px 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .shimmer {
        border-radius: 6px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.06) 0%,
          rgba(255, 255, 255, 0.14) 50%,
          rgba(255, 255, 255, 0.06) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
      }
      .skeleton-sidebar .shimmer {
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.04) 0%,
          rgba(255, 255, 255, 0.1) 50%,
          rgba(255, 255, 255, 0.04) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }

      .skeleton-logo {
        height: 32px;
        width: 120px;
      }
      .skeleton-nav-item {
        height: 36px;
        width: 100%;
      }
      .skeleton-nav-item.short {
        width: 70%;
      }
      .skeleton-nav-divider {
        height: 1px;
        background: #3a3a3a;
        margin: 4px 0;
      }
      .skeleton-header {
        height: 52px;
        width: 100%;
        border-radius: 8px;
      }
      .skeleton-tabs {
        display: flex;
        gap: 8px;
      }
      .skeleton-tab {
        height: 36px;
        width: 120px;
        border-radius: 6px;
      }
      .skeleton-row {
        height: 52px;
        width: 100%;
        border-radius: 6px;
      }
      .skeleton-row.short {
        width: 75%;
      }
    </style>
    <script>
      (function () {
        try {
          var storedTheme = window.localStorage.getItem('gh_theme_v1');
          if (storedTheme) {
            var parsedTheme = JSON.parse(storedTheme);
            document.documentElement.setAttribute('data-theme', parsedTheme === 'dark' ? 'dark' : 'light');
          }
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }

        var known = ['today', 'portfolio', 'customers', 'customer', 'manager', 'simulator', 'toolkit', 'success-plans', 'account', 'journey', 'programs', 'program', 'playbooks', 'risks', 'expansion', 'voc', 'reports', 'settings', 'resources', 'cheatsheet', 'exports', 'intake'];
        var parts = window.location.pathname.split('/').filter(Boolean);
        var base = '';
        if (parts.length > 1 && known.indexOf(parts[1]) >= 0) {
          base = '/' + parts[0];
        } else if (parts.length && known.indexOf(parts[0]) < 0 && !parts[0].includes('.')) {
          base = '/' + parts[0];
        }
        window.__APP_BASE_PATH__ = base;
      })();
    </script>
  </head>
  <body>
    <div id="app-loading" aria-hidden="true">
      <div class="skeleton-sidebar">
        <div class="skeleton-logo shimmer"></div>
        <div class="skeleton-nav-item shimmer"></div>
        <div class="skeleton-nav-item shimmer"></div>
        <div class="skeleton-nav-item short shimmer"></div>
        <div class="skeleton-nav-divider"></div>
        <div class="skeleton-nav-item shimmer"></div>
        <div class="skeleton-nav-item shimmer"></div>
      </div>
      <div class="skeleton-main">
        <div class="skeleton-header shimmer"></div>
        <div class="skeleton-tabs">
          <div class="skeleton-tab shimmer"></div>
          <div class="skeleton-tab shimmer"></div>
          <div class="skeleton-tab shimmer"></div>
        </div>
        <div class="skeleton-row shimmer"></div>
        <div class="skeleton-row shimmer"></div>
        <div class="skeleton-row shimmer"></div>
        <div class="skeleton-row short shimmer"></div>
        <div class="skeleton-row shimmer"></div>
      </div>
    </div>

    <div class="app-root" data-app-root>
      <header class="app-header">
        <div class="app-header__left">
          <button
            class="header-hamburger"
            type="button"
            data-sidebar-toggle
            aria-label="Open navigation"
            aria-expanded="false"
            aria-controls="app-left-rail"
          >
            <span></span><span></span><span></span>
          </button>
          <span class="app-header__product">GitLAB-Health</span>
          <span class="status-pill status-pill--internal" data-header-status>
            <span class="status-pill__dot" aria-hidden="true"></span>
            Internal
          </span>
          <span class="status-pill" data-safe-label>Today • CSE On-Demand</span>
        </div>

        <div class="app-header__right">
          <button class="search-trigger" type="button" data-open-palette>
            <span class="search-trigger__icon" aria-hidden="true">
              <svg viewBox="0 0 16 16" focusable="false">
                <circle cx="7" cy="7" r="4.25"></circle>
                <path d="M10.3 10.3L13.4 13.4"></path>
              </svg>
            </span>
            <span class="search-trigger__label">Search accounts and actions</span>
            <span class="search-trigger__kbd">Ctrl+K</span>
          </button>

          <label class="safe-toggle" data-safe-toggle-label>
            <input class="safe-toggle__input" type="checkbox" data-global-safe-toggle />
            <span class="toggle-switch" aria-hidden="true"></span>
            <span>Customer-Safe</span>
          </label>

          <button class="header-btn header-btn--with-label" type="button" data-global-export>
            <span class="header-btn__icon" aria-hidden="true">
              <svg viewBox="0 0 16 16" focusable="false">
                <path d="M8 2.5v7"></path>
                <path d="M5.5 7.8L8 10.5l2.5-2.7"></path>
                <path d="M3 12.5h10"></path>
              </svg>
            </span>
            Export
          </button>

          <div class="control-menu">
            <button class="header-btn" type="button" data-open-more aria-haspopup="menu" aria-expanded="false" aria-label="Open more actions">⋯</button>
            <div class="control-menu__panel" data-more-menu hidden>
              <button class="ghost-btn" type="button" data-toggle-theme>Toggle theme</button>
              <button class="ghost-btn" type="button" data-open-settings>Settings</button>
              <button class="ghost-btn" type="button" data-copy-snapshot>Copy snapshot link</button>
              <button class="ghost-btn" type="button" data-go-resources>Resources</button>
            </div>
          </div>
        </div>
      </header>

      <div class="header-panel" data-filters-panel hidden>
        <div class="header-panel__inner">
          <p class="meta">Advanced filters apply to portfolio and queue views instantly.</p>
          <div class="filter-row filter-row--panel">
            <fieldset class="filter-multi">
              <legend>Engagement Type</legend>
              <label class="safe-toggle">
                <input type="checkbox" data-global-filter-engagement-type="WEBINAR" />
                <span>Webinar</span>
              </label>
              <label class="safe-toggle">
                <input type="checkbox" data-global-filter-engagement-type="OFFICE_HOURS" />
                <span>Office Hours</span>
              </label>
              <label class="safe-toggle">
                <input type="checkbox" data-global-filter-engagement-type="HANDS_ON_LAB" />
                <span>Hands-On Lab</span>
              </label>
              <label class="safe-toggle">
                <input type="checkbox" data-global-filter-engagement-type="ON_DEMAND" />
                <span>On-Demand</span>
              </label>
            </fieldset>

            <fieldset class="filter-multi">
              <legend>Requested By</legend>
              <label class="safe-toggle">
                <input type="checkbox" data-global-filter-requested-by="CSM" />
                <span>CSM</span>
              </label>
              <label class="safe-toggle">
                <input type="checkbox" data-global-filter-requested-by="AE" />
                <span>AE</span>
              </label>
              <label class="safe-toggle">
                <input type="checkbox" data-global-filter-requested-by="CUSTOMER" />
                <span>Customer</span>
              </label>
              <label class="safe-toggle">
                <input type="checkbox" data-global-filter-requested-by="RENEWAL_MANAGER" />
                <span>Renewal Manager</span>
              </label>
            </fieldset>

            <fieldset class="filter-multi">
              <legend>Engagement Status</legend>
              <label class="safe-toggle">
                <input type="checkbox" data-global-filter-engagement-status="SCHEDULED" />
                <span>Scheduled</span>
              </label>
              <label class="safe-toggle">
                <input type="checkbox" data-global-filter-engagement-status="IN_PROGRESS" />
                <span>In Progress</span>
              </label>
              <label class="safe-toggle">
                <input type="checkbox" data-global-filter-engagement-status="COMPLETED" />
                <span>Completed</span>
              </label>
              <label class="safe-toggle">
                <input type="checkbox" data-global-filter-engagement-status="REQUESTED" />
                <span>Requested</span>
              </label>
            </fieldset>
          </div>
        </div>
      </div>

      <div class="sidebar-overlay" data-sidebar-overlay></div>

      <main class="app-shell" aria-live="polite">
        <aside class="sidebar left-rail card" id="app-left-rail" data-left-rail aria-label="Work queue navigation"></aside>
        <section class="main route-stage" data-route-root></section>
      </main>
    </div>

    <div class="command-palette" data-command-palette aria-hidden="true">
      <div class="command-panel" role="dialog" aria-modal="true" aria-label="Command palette">
        <div class="command-head">
          <input type="search" data-command-input placeholder="Search accounts, routes, and actions..." />
          <button class="ghost-btn" type="button" data-command-close>Close</button>
        </div>
        <ul class="command-results" data-command-results></ul>
      </div>
    </div>

    <div data-toast-container-root></div>

    <div class="app-settings" data-settings aria-hidden="true">
      <div class="app-settings__backdrop" data-close-settings></div>
      <div class="app-settings__panel" role="dialog" aria-modal="true" aria-label="Settings">
        <header class="app-settings__head">
          <h2>Settings</h2>
          <button class="ghost-btn" type="button" data-close-settings>Close</button>
        </header>
        <p class="muted">Reset local interactive data while keeping static dataset.</p>
        <button class="qa" type="button" data-reset-local-state>Reset Local State</button>
      </div>
    </div>

    <script>
      (function () {
        var base = window.__APP_BASE_PATH__ || '';
        var script = document.createElement('script');
        script.type = 'module';
        script.src = base + '/src/main.js';
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
